
networks:
  kyc-network:
    driver: bridge

services:

  # API Gateway - Entry point for all requests
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: kyc-api-gateway
    ports:
      - "8000:8000"
    environment:
      ORCHESTRATION_SERVICE_URL: http://orchestration-service:8010
      LOG_LEVEL: INFO
    depends_on:
      - orchestration-service
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Orchestration Service - Coordinates all agents
  orchestration-service:
    build:
      context: ./orchestration-service
      dockerfile: Dockerfile
    container_name: kyc-orchestration
    ports:
      - "8010:8010"
    environment:
      PORT: 8010
      EXTRACT_AGENT_URL: http://extract-agent:8000
      VERIFY_AGENT_URL: http://verify-agent:8000
      REASON_AGENT_URL: http://reason-agent:8000
      RISK_AGENT_URL: http://risk-agent:8000
      DECISION_AGENT_URL: http://decision-agent:8000
      LOG_LEVEL: INFO
    depends_on:
      - extract-agent
      - verify-agent
      - reason-agent
      - risk-agent
      - decision-agent
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Extract Agent - Extracts information from documents
  extract-agent:
    build:
      context: ./agents/extract-agent
      dockerfile: Dockerfile
    container_name: kyc-extract-agent
    ports:
      - "8001:8000"
    environment:
      LOG_LEVEL: INFO
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Verify Agent - Verifies extracted information
  verify-agent:
    build:
      context: ./agents/verify-agent
      dockerfile: Dockerfile
    container_name: kyc-verify-agent
    ports:
      - "8002:8000"
    environment:
      LOG_LEVEL: INFO
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # MCP Server - Model Context Protocol for RAG + Tools
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: kyc-mcp-server
    ports:
      - "8020:8020"
    environment:
      LOG_LEVEL: INFO
      VECTOR_DB_PATH: /data/kyc_vector_db
    volumes:
      - kyc-vector-db:/data/kyc_vector_db
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Reason Agent - Performs reasoning on extracted data (with RAG + MCP)
  reason-agent:
    build:
      context: ./agents/reason-agent
      dockerfile: Dockerfile
    container_name: kyc-reason-agent
    ports:
      - "8003:8000"
    environment:
      LOG_LEVEL: INFO
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: mistral
      MCP_SERVER_URL: http://mcp-server:8020
    depends_on:
      - mcp-server
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Risk Agent - Assesses risk levels
  risk-agent:
    build:
      context: ./agents/risk-agent
      dockerfile: Dockerfile
    container_name: kyc-risk-agent
    ports:
      - "8004:8000"
    environment:
      LOG_LEVEL: INFO
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Decision Agent - Makes final decisions
  decision-agent:
    build:
      context: ./agents/decision-agent
      dockerfile: Dockerfile
    container_name: kyc-decision-agent
    ports:
      - "8005:8000"
    environment:
      LOG_LEVEL: INFO
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Frontend - React/Node.js UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyc-frontend
    ports:
      - "3000:3000"
    environment:
      API_GATEWAY_URL: http://localhost:8000
      NODE_ENV: production
    depends_on:
      - api-gateway
    networks:
      - kyc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  kyc-vector-db:
    driver: local
