version: '3.8'

services:
  # Frontend Web UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kyc-frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api-gateway:8000
      - PORT=3000
    depends_on:
      - api-gateway
    networks:
      - kyc-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: kyc-api-gateway
    ports:
      - "8000:8000"
    environment:
      - ORCHESTRATION_SERVICE_URL=http://orchestration-service:8010
      - REQUEST_TIMEOUT=300
      - PORT=8000
    depends_on:
      - orchestration-service
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Orchestration Service
  orchestration-service:
    build:
      context: ./orchestration-service
      dockerfile: Dockerfile
    container_name: kyc-orchestration-service
    ports:
      - "8010:8010"
    environment:
      - EXTRACT_AGENT_URL=http://extract-agent:8000
      - VERIFY_AGENT_URL=http://verify-agent:8000
      - REASON_AGENT_URL=http://reason-agent:8000
      - RISK_AGENT_URL=http://risk-agent:8000
      - DECISION_AGENT_URL=http://decision-agent:8000
      - REQUEST_TIMEOUT=120
      - PORT=8010
    depends_on:
      - extract-agent
      - verify-agent
      - reason-agent
      - risk-agent
      - decision-agent
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Extract Agent
  extract-agent:
    build:
      context: ./agents/extract-agent
      dockerfile: Dockerfile
    container_name: kyc-extract-agent
    ports:
      - "8001:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Verify Agent
  verify-agent:
    build:
      context: ./agents/verify-agent
      dockerfile: Dockerfile
    container_name: kyc-verify-agent
    ports:
      - "8002:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Reason Agent (LLM Analysis)
  reason-agent:
    build:
      context: ./agents/reason-agent
      dockerfile: Dockerfile
    container_name: kyc-reason-agent
    ports:
      - "8003:8000"
    environment:
      - PORT=8000
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=mistral
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Risk Agent
  risk-agent:
    build:
      context: ./agents/risk-agent
      dockerfile: Dockerfile
    container_name: kyc-risk-agent
    ports:
      - "8004:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Decision Agent
  decision-agent:
    build:
      context: ./agents/decision-agent
      dockerfile: Dockerfile
    container_name: kyc-decision-agent
    ports:
      - "8005:8000"
    environment:
      - PORT=8000
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=mistral
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: kyc-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - kyc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  kyc-network:
    driver: bridge

volumes:
  ollama_data:

