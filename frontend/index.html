<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYC/AML Agentic AI System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-area p {
            color: #666;
            margin-bottom: 10px;
        }

        #file {
            display: none;
        }

        .file-input-label {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .file-input-label:hover {
            background: #764ba2;
        }

        .file-name {
            margin-top: 15px;
            color: #333;
            font-weight: 500;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 20px;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.healthy {
            background: #10b981;
        }

        .status-indicator.degraded {
            background: #f59e0b;
        }

        .status-indicator.unhealthy {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-section {
            margin-bottom: 20px;
        }

        .service-status {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .service-status:last-child {
            border-bottom: none;
        }

        .result-container {
            display: none;
        }

        .result-container.show {
            display: block;
        }

        .result-title {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            color: #333;
            font-size: 1.1em;
            font-weight: 600;
            margin-top: 5px;
        }

        .decision-approved {
            color: #10b981;
        }

        .decision-rejected {
            color: #ef4444;
        }

        .decision-review {
            color: #f59e0b;
        }

        .error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .success {
            background: #dcfce7;
            border-left: 4px solid #10b981;
            color: #166534;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            color: #92400e;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .json-viewer {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
        }

        .clear-button {
            background: #6b7280;
            margin-top: 10px;
        }

        .clear-button:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>KYC/AML Agentic AI System</h1>
            <p>Document Analysis & Risk Assessment Platform</p>
        </header>

        <div class="main-content">
            <!-- Upload Section -->
            <div class="card">
                <h2>📄 Document Upload</h2>

                <div class="upload-area" id="uploadArea">
                    <p>Drag and drop your document here or click to select</p>
                    <label for="file" class="file-input-label">Choose File</label>
                    <input type="file" id="file" accept="image/*,.pdf" />
                    <div class="file-name" id="fileName"></div>
                </div>

                <button id="submitBtn" onclick="upload()" disabled>Submit for Processing</button>
                <button class="clear-button" onclick="clearForm()">Clear</button>
            </div>

            <!-- Status Section -->
            <div class="card">
                <h2>🔍 System Status</h2>
                <div class="status-section" id="statusSection">
                    <div class="loading">
                        <div class="spinner"></div>
                        Checking service status...
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="card result-container" id="resultContainer">
            <h2>📊 Analysis Results</h2>

            <div id="resultContent"></div>

            <div style="margin-top: 20px;">
                <button class="clear-button" onclick="clearForm()">Process Another Document</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = localStorage.getItem('apiUrl') || 'http://localhost:8000';

        // Drag and drop
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('file');
        const fileNameDisplay = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            fileInput.files = e.dataTransfer.files;
            updateFileName();
        });

        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            const file = fileInput.files[0];
            if (file) {
                fileNameDisplay.textContent = `Selected: ${file.name}`;
                submitBtn.disabled = false;
            } else {
                fileNameDisplay.textContent = '';
                submitBtn.disabled = true;
            }
        }

        async function checkSystemStatus() {
            const statusSection = document.getElementById('statusSection');
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();

                let html = '<div class="result-title">Service Status</div>';
                html += `<div class="service-status">
                    <span><span class="status-indicator ${data.status === 'healthy' ? 'healthy' : 'degraded'}"></span>API Gateway</span>
                    <span>${data.status.toUpperCase()}</span>
                </div>`;

                if (data.orchestration_service) {
                    html += `<div class="service-status">
                        <span><span class="status-indicator ${data.orchestration_service === 'connected' ? 'healthy' : 'unhealthy'}"></span>Orchestration</span>
                        <span>${data.orchestration_service}</span>
                    </div>`;
                }

                statusSection.innerHTML = html;
            } catch (e) {
                statusSection.innerHTML = '<div class="error">Unable to connect to API Gateway</div>';
            }
        }

        async function upload() {
            const file = fileInput.files[0];
            if (!file) {
                showError('Please select a file first');
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                const resultContainer = document.getElementById('resultContainer');
                const resultContent = document.getElementById('resultContent');

                resultContent.innerHTML = '<div class="loading"><div class="spinner"></div>Processing document...</div>';
                resultContainer.classList.add('show');

                const response = await fetch(`${API_URL}/kyc`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP ${response.status}`);
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                resultContent.innerHTML = `<div class="error"><strong>Error:</strong> ${error.message}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit for Processing';
            }
        }

        function displayResults(data) {
            const resultContent = document.getElementById('resultContent');

            if (data.error) {
                resultContent.innerHTML = `<div class="error"><strong>Error:</strong> ${data.error}</div>`;
                return;
            }

            const result = data.result || data;

            // Helper function to get document type from various sources
            function getDocumentType() {
                console.log("🔍 Searching for document_type...");
                console.log("  data.document_type:", data.document_type);
                console.log("  result.document_type:", result.document_type);

                // Try multiple paths
                const docType =
                    data.document_type ||
                    result.document_type ||
                    (result.extract && result.extract.document_type) ||
                    (result.decision && result.decision.document_type) ||
                    (result.verify && result.verify.document_type) ||
                    (result.reason && result.reason.document_type) ||
                    (result.risk && result.risk.document_type);

                console.log("✅ Found document_type:", docType || 'NOT FOUND');
                return docType || 'Unknown';
            }

            // Helper function to get confidence from various sources
            function getConfidence() {
                console.log("🔍 Searching for confidence...");
                const conf =
                    data.confidence ||
                    result.confidence ||
                    (result.extract && result.extract.confidence) ||
                    (result.decision && result.decision.confidence) ||
                    (result.verify && result.verify.confidence) ||
                    (result.reason && result.reason.confidence) ||
                    (result.risk && result.risk.confidence) ||
                    0;

                console.log("✅ Found confidence:", conf);
                return conf;
            }

            // Check for invalid document
            if (data.final_status === 'rejected' || result.status === 'invalid_document') {
                let html = `<div class="error"><strong style="font-size: 1.2em;">⚠ Document Validation Failed</strong></div>`;

                // Get document type from all possible sources
                const docType = getDocumentType();
                const confidence = getConfidence();

                // Get rejection reason from all possible sources
                let rejectionReason = data.rejection_reason ||
                                     result.rejection_reason ||
                                     result.reason ||
                                     (result.extract && result.extract.reason) ||
                                     data.message ||
                                     'Document verification failed';

                console.log("📋 Rejected Document Details:");
                console.log("  Type:", docType);
                console.log("  Confidence:", confidence);
                console.log("  Reason:", rejectionReason);

                // Prominently show document type (ALWAYS for rejected docs)
                html += '<div class="result-item" style="background: #fff3cd; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #ffc107;">';
                html += '<div class="result-label" style="color: #856404;">🔍 Document Identified As</div>';
                html += `<div class="result-value" style="color: #d39e00; font-size: 1.3em; font-weight: bold; margin-top: 8px;">${docType}</div>`;
                html += `<div style="color: #856404; font-size: 0.95em; margin-top: 8px;">Confidence: <strong>${(confidence * 100).toFixed(1)}%</strong></div>`;
                html += '</div>';

                // Prominently show rejection reason
                html += '<div class="result-item" style="background: #fee2e2; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #ef4444;">';
                html += '<div class="result-label" style="color: #991b1b;">❌ Rejection Reason</div>';
                html += `<div class="result-value" style="color: #991b1b; font-size: 1.1em; font-weight: 500; margin-top: 8px;">${rejectionReason}</div>`;
                html += '</div>';

                // Show all_scores if available
                const allScores = data.all_scores || result.all_scores || (result.extract && result.extract.all_scores);
                if (allScores) {
                    html += '<div class="result-item">';
                    html += '<div class="result-label">Document Type Analysis</div>';
                    let scoresHtml = '<div style="font-size: 0.9em; margin-top: 8px; padding: 10px; background: #f8f9fa; border-radius: 5px;">';
                    for (const [type, score] of Object.entries(allScores)) {
                        const percentage = (score * 100).toFixed(1);
                        scoresHtml += `<div style="margin: 5px 0;"><strong>${type}:</strong> ${percentage}%</div>`;
                    }
                    scoresHtml += '</div>';
                    html += scoresHtml;
                    html += '</div>';
                }

                resultContent.innerHTML = html;
                return;
            }

            // Extract decision from various possible locations
            let decisionValue = null;
            let decisionObj = null;

            // Debug: Log the entire result to help debug
            console.log("Full result object:", result);
            console.log("Result.decision:", result.decision);

            // Try to find decision in multiple places
            if (result.decision) {
                decisionObj = result.decision;
                if (typeof decisionObj === 'string') {
                    decisionValue = decisionObj;
                } else if (typeof decisionObj === 'object') {
                    // If it's an object, look for a 'decision' property
                    decisionValue = decisionObj.decision || null;
                }
            }

            // If still no decision value found, check if decision is at top level as a direct property
            if (!decisionValue && typeof result === 'object') {
                // Maybe the entire result is the decision object
                if (result.decision && typeof result.decision === 'object' && result.decision.decision) {
                    decisionValue = result.decision.decision;
                    decisionObj = result.decision;
                }
            }

            // Final fallback: use decision object if we found it
            if (!decisionObj) {
                decisionObj = (result.decision && typeof result.decision === 'object') ? result.decision : {};
            }

            const decisionClass = {
                'APPROVED': 'decision-approved',
                'REJECTED': 'decision-rejected',
                'REVIEW': 'decision-review'
            }[decisionValue] || '';

            let html = '<div class="success"><strong style="font-size: 1.1em;">✓ Document Processing Successful</strong></div>';

            // Document Type - ALWAYS DISPLAY (Critical KYC Info)
            const docType = getDocumentType();
            const confidence = getConfidence();

            console.log("📋 Document Type Display Check:");
            console.log("  docType:", docType);
            console.log("  confidence:", confidence);
            console.log("  Will display:", docType !== 'Unknown');

            // ALWAYS show document type section with enhanced styling
            html += '<div class="result-item" style="background: #d1e7dd; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 4px solid #198754;">';
            html += '<div class="result-label" style="color: #0f5132;">📋 Document Type Identified</div>';
            html += `<div class="result-value" style="color: #0f5132; font-size: 1.3em; font-weight: bold; margin-top: 8px;">${docType}</div>`;
            if (confidence > 0) {
                html += `<div style="color: #0f5132; font-size: 0.95em; margin-top: 8px;">Confidence: <strong>${(confidence * 100).toFixed(1)}%</strong></div>`;
            }
            html += '</div>';

            html += '<div class="result-item">';
            html += '<div class="result-label">Final Decision</div>';
            html += `<div class="result-value ${decisionClass}" style="font-size: 1.2em;">${decisionValue || 'PENDING REVIEW'}</div>`;
            if (decisionObj && decisionObj.reason) html += `<div style="color: #666; font-size: 0.9em; margin-top: 5px;">${decisionObj.reason}</div>`;
            if (decisionObj && decisionObj.confidence) html += `<div style="color: #666; font-size: 0.9em; margin-top: 5px;">Confidence: <strong>${(decisionObj.confidence * 100).toFixed(1)}%</strong></div>`;
            html += '</div>';

            if (result.risk) {
                html += '<div class="result-item">';
                html += '<div class="result-label">Risk Assessment</div>';
                html += `<div class="result-value">${result.risk.risk_level || 'N/A'}</div>`;
                html += `<div style="color: #666; font-size: 0.9em;">Score: ${result.risk.risk_score || 'N/A'}</div>`;
                html += '</div>';
            }

            if (data.processing_time_seconds) {
                html += '<div class="result-item">';
                html += '<div class="result-label">Processing Time</div>';
                html += `<div class="result-value">${data.processing_time_seconds.toFixed(2)} seconds</div>`;
                html += '</div>';
            }

            if (data.timestamp) {
                html += '<div class="result-item">';
                html += '<div class="result-label">Timestamp</div>';
                html += `<div class="result-value" style="font-size: 0.9em;">${new Date(data.timestamp).toLocaleString()}</div>`;
                html += '</div>';
            }

            html += '<div style="margin-top: 20px;">';
            html += '<div class="result-label">Full Response (JSON)</div>';
            html += `<div class="json-viewer">${JSON.stringify(data, null, 2)}</div>`;
            html += '</div>';

            resultContent.innerHTML = html;
        }

        function showError(message) {
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = `<div class="error"><strong>Error:</strong> ${message}</div>`;
            resultContainer.classList.add('show');
        }

        function clearForm() {
            fileInput.value = '';
            fileNameDisplay.textContent = '';
            submitBtn.disabled = true;
            document.getElementById('resultContainer').classList.remove('show');
            checkSystemStatus();
        }

        // Check status on page load
        window.addEventListener('load', checkSystemStatus);

        // Refresh status periodically
        setInterval(checkSystemStatus, 30000);
    </script>
</body>
</html>
